<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#efece8" />
  <title>Another Day Coffee</title>

  <!-- Vue 3 (global build, no build step needed) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SheetJS: lets Admin mode read an uploaded .xlsx entirely in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Elegant, readable type: Fraunces for display, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    // Pastel "latte" palette + fonts, exposed as Tailwind utilities.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            /* Deep coffee browns */
            mocha:  { 300: '#b08a6a', 400: '#8c6a4b', 500: '#6f4d33', 600: '#43301f' },
            sage:   { 200: '#d3e2c6', 300: '#bcd0aa', 400: '#a3ba8c' },
            blush:  { 200: '#f3dbd5', 300: '#e8c4bf' },
            lilac:  { 200: '#e0d6f0', 300: '#cabde6' },
          },
        },
      },
    };
  </script>

  <style>
    :root { color-scheme: light; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      /* Soft light-gray base with a barely-there warm tint. */
      background-color: #f3f1ee;
    }
    .font-display { font-family: 'Fraunces', Georgia, serif; }

    /* Stop mobile double-tap zoom / long-press selection from "blowing up"
       buttons, and remove the grey tap flash. */
    * { -webkit-tap-highlight-color: transparent; }
    button, a, [role="button"], .pill {
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    /* --- Ambient koi-pond background ------------------------------------- */
    /* A faint, slow pond: soft pastel water tint, koi drifting across, and
       grassy reeds swaying in the lower corners. Everything sits behind the
       frosted glass (which blurs it further), so it stays non-distracting. */
    .ambient { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }

    /* Blurred pastel "water" pools — a touch more colourful. */
    .blob { position: absolute; border-radius: 9999px; filter: blur(72px); opacity: 0.46; }
    .blob-1 { width: 340px; height: 340px; background: #bcd6a9; top: -70px; left: -90px; animation: drift 20s ease-in-out infinite; }
    .blob-2 { width: 300px; height: 300px; background: #f3c9c1; bottom: -50px; right: -80px; animation: drift 24s ease-in-out infinite reverse; }
    .blob-3 { width: 260px; height: 260px; background: #cabfe8; top: 42%; left: 40%; animation: drift 28s ease-in-out infinite; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(20px, -28px) scale(1.08); }
    }

    /* Koi: small, pale, slow. They mostly glide through the side margins and
       are blurred away where they pass behind cards. */
    .koi { position: absolute; top: 0; left: 0; will-change: transform; }
    /* A small school of koi in different tints (hue-rotate recolours them). */
    .koi-a { width: 112px; opacity: 0.34; filter: saturate(1.3); animation: swimRight 64s linear infinite; }
    .koi-b { width: 84px;  opacity: 0.30; filter: hue-rotate(-24deg) saturate(1.4); animation: swimLeft 82s linear infinite; }
    .koi-c { width: 98px;  opacity: 0.30; filter: hue-rotate(20deg) saturate(1.5); animation: swimRight2 92s linear infinite; }
    .koi-d { width: 76px;  opacity: 0.26; filter: hue-rotate(325deg) saturate(1.3); animation: swimLeft2 106s linear infinite; }
    @keyframes swimRight {
      0%   { transform: translate(-22vw, 16vh) rotate(5deg); }
      50%  { transform: translate(50vw, 9vh)  rotate(-4deg); }
      100% { transform: translate(122vw, 17vh) rotate(5deg); }
    }
    @keyframes swimLeft {
      0%   { transform: translate(122vw, 64vh) scaleX(-1) rotate(4deg); }
      50%  { transform: translate(46vw, 72vh)  scaleX(-1) rotate(-5deg); }
      100% { transform: translate(-26vw, 62vh) scaleX(-1) rotate(4deg); }
    }
    @keyframes swimRight2 {
      0%   { transform: translate(-26vw, 44vh) rotate(-4deg); }
      50%  { transform: translate(52vw, 50vh)  rotate(5deg); }
      100% { transform: translate(126vw, 42vh) rotate(-4deg); }
    }
    @keyframes swimLeft2 {
      0%   { transform: translate(126vw, 30vh) scaleX(-1) rotate(5deg); }
      50%  { transform: translate(40vw, 22vh)  scaleX(-1) rotate(-4deg); }
      100% { transform: translate(-30vw, 32vh) scaleX(-1) rotate(5deg); }
    }

    /* Grassy reeds in the bottom corners, gently swaying. */
    .reeds { position: absolute; bottom: 0; height: 175px; width: 145px; opacity: 0.5; }
    .reeds-l { left: -8px; }
    .reeds-r { right: -8px; transform: scaleX(-1); }
    .reed { fill: none; stroke-linecap: round; transform-box: fill-box; transform-origin: bottom center;
            animation: sway 6.5s ease-in-out infinite; }
    .reed:nth-child(2) { animation-duration: 8s;   animation-delay: -1.5s; }
    .reed:nth-child(3) { animation-duration: 7.2s; animation-delay: -3s; }
    .reed:nth-child(4) { animation-duration: 9s;   animation-delay: -0.8s; }
    .reed:nth-child(5) { animation-duration: 7.8s; animation-delay: -2.2s; }
    @keyframes sway {
      0%, 100% { transform: rotate(-2.5deg); }
      50%      { transform: rotate(2.5deg); }
    }

    /* --- Frosted glass ---------------------------------------------------- */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .glass-header {
      background: rgba(243, 241, 238, 0.7);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border-bottom: 1px solid rgba(157, 132, 117, 0.12);
    }

    /* --- Card entrance + hover ------------------------------------------- */
    .card {
      position: relative;
      transition: transform .35s cubic-bezier(.22,.61,.36,1),
                  box-shadow .35s ease, background-color .35s ease;
      will-change: transform;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px -12px rgba(125, 103, 87, 0.28);
      background: rgba(255, 255, 255, 0.72);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rise { animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }

    /* --- Category swap: cross-fade the whole list as one block ----------- */
    /* Fading the list container (out-in) avoids the per-card overlap glitch;
       the individual cards still stagger in via the `rise` animation. */
    .swap-enter-active { transition: opacity .3s ease; }
    .swap-leave-active { transition: opacity .2s ease; }
    .swap-enter-from, .swap-leave-to { opacity: 0; }

    /* --- Toast fade ------------------------------------------------------ */
    .fade-enter-active, .fade-leave-active { transition: opacity .3s ease, transform .3s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; transform: translate(-50%, 10px); }

    /* --- Side drawer ----------------------------------------------------- */
    .drawer-enter-active, .drawer-leave-active { transition: transform .32s cubic-bezier(.22,.61,.36,1); }
    .drawer-enter-from, .drawer-leave-to { transform: translateX(-100%); }
    .overlay-enter-active, .overlay-leave-active { transition: opacity .3s ease; }
    .overlay-enter-from, .overlay-leave-to { opacity: 0; }

    /* --- Bottom sheet (cart) -------------------------------------------- */
    .sheet-enter-active, .sheet-leave-active { transition: transform .34s cubic-bezier(.22,.61,.36,1); }
    .sheet-enter-from, .sheet-leave-to { transform: translateY(100%); }

    /* Crisp text rendering for a polished, modern feel */
    h1, h2, h3, .font-display { letter-spacing: -0.01em; }
    input { font-family: inherit; }

    /* --- Pills ----------------------------------------------------------- */
    .pill { position: relative; overflow: hidden; transition: background-color .3s ease, color .3s ease, transform .2s ease, box-shadow .3s ease; }
    .pill:active { transform: scale(.94); }

    /* A selected (in-cart) card gets a clean coffee-toned ring. */
    .selected-liquid { box-shadow: 0 0 0 2px rgba(111,77,51,.55), 0 12px 26px -14px rgba(67,48,31,.3); }

    /* Hide the horizontal scrollbar on the category pill row */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .snap-x-mandatory { scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch; }

    /* Gentle focus ring for inline-edit fields */
    [contenteditable="true"]:focus { background: rgba(255,255,255,.6); border-radius: 6px; }

    @media (prefers-reduced-motion: reduce) {
      .blob, .card, .pill, .koi, .reed { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body class="text-mocha-600 antialiased">
  <!-- Ambient koi-pond background, sits behind everything -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Reusable koi silhouette (head facing right) -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <g id="koiShape">
          <path d="M-28,-3 C -42,-11 -54,-13 -60,-9 C -55,-4 -55,4 -60,9 C -54,13 -42,11 -28,3 C -31,0 -31,0 -28,-3 Z" fill="#f1ebe4"/>
          <path d="M6,-13 C 2,-24 -8,-24 -13,-19 C -7,-15 -1,-13 4,-11 Z" fill="#f1ebe4"/>
          <path d="M6,13 C 2,24 -8,24 -13,19 C -7,15 -1,13 4,11 Z" fill="#f1ebe4"/>
          <path d="M42,0 C42,-9 30,-15 12,-15 C -6,-15 -20,-10 -28,-3 C -30,-1 -30,1 -28,3 C -20,10 -6,15 12,15 C30,15 42,9 42,0 Z" fill="#fdfbf9"/>
          <circle cx="12" cy="-3" r="6.5" fill="#e2b38d"/>
          <circle cx="-3" cy="5"  r="4.5" fill="#e0bca0"/>
          <circle cx="25" cy="4"  r="4"   fill="#e6cdbf"/>
          <circle cx="34" cy="-4" r="1.6" fill="#9a8475"/>
        </g>
      </defs>
    </svg>

    <!-- A small school of koi drifting slowly across the pond -->
    <svg class="koi koi-a" viewBox="-70 -26 140 52"><use href="#koiShape"/></svg>
    <svg class="koi koi-b" viewBox="-70 -26 140 52"><use href="#koiShape"/></svg>
    <svg class="koi koi-c" viewBox="-70 -26 140 52"><use href="#koiShape"/></svg>
    <svg class="koi koi-d" viewBox="-70 -26 140 52"><use href="#koiShape"/></svg>

    <!-- Grassy reeds swaying in the lower corners -->
    <svg class="reeds reeds-l" viewBox="0 0 145 175">
      <path class="reed" d="M28,176 C 22,116 34,76 26,16"  stroke="#a8b89c" stroke-width="5.5"/>
      <path class="reed" d="M52,176 C 47,124 60,90 54,34"  stroke="#b9c7ad" stroke-width="4.5"/>
      <path class="reed" d="M80,176 C 86,120 72,82 82,28"  stroke="#9aab8d" stroke-width="6"/>
      <path class="reed" d="M104,176 C 110,124 96,96 102,46" stroke="#b2c0a4" stroke-width="4"/>
      <path class="reed" d="M14,176 C 10,136 22,106 14,66"  stroke="#a8b89c" stroke-width="5"/>
    </svg>
    <svg class="reeds reeds-r" viewBox="0 0 145 175">
      <path class="reed" d="M28,176 C 22,116 34,76 26,16"  stroke="#a8b89c" stroke-width="5.5"/>
      <path class="reed" d="M52,176 C 47,124 60,90 54,34"  stroke="#b9c7ad" stroke-width="4.5"/>
      <path class="reed" d="M80,176 C 86,120 72,82 82,28"  stroke="#9aab8d" stroke-width="6"/>
      <path class="reed" d="M104,176 C 110,124 96,96 102,46" stroke="#b2c0a4" stroke-width="4"/>
      <path class="reed" d="M14,176 C 10,136 22,106 14,66"  stroke="#a8b89c" stroke-width="5"/>
    </svg>
  </div>

  <!-- The whole app is constrained to a phone-width column and centered. -->
  <div id="app" class="relative z-10 mx-auto max-w-md min-h-screen"></div>

  <!-- Mount point template lives in app.js to keep everything in one place. -->
  <script src="app.js"></script>
</body>
</html>
