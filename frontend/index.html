<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#efece8" />
  <title>Another Day Coffee</title>

  <!-- Vue 3 (global build, no build step needed) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SheetJS: lets Admin mode read an uploaded .xlsx entirely in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase (optional): realtime order database. Inert until configured. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- Elegant, readable type: Fraunces for display, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    // Pastel "latte" palette + fonts, exposed as Tailwind utilities.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            /* Deep coffee browns */
            mocha:  { 300: '#b08a6a', 400: '#8c6a4b', 500: '#6f4d33', 600: '#43301f' },
            sage:   { 200: '#d3e2c6', 300: '#bcd0aa', 400: '#a3ba8c' },
            blush:  { 200: '#f3dbd5', 300: '#e8c4bf' },
            lilac:  { 200: '#e0d6f0', 300: '#cabde6' },
          },
        },
      },
    };
  </script>

  <style>
    :root { color-scheme: light; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      /* Soft light-gray base with a barely-there warm tint. */
      background-color: #f3f1ee;
    }
    .font-display { font-family: 'Fraunces', Georgia, serif; }

    /* Stop mobile double-tap zoom / long-press selection from "blowing up"
       buttons, and remove the grey tap flash. */
    * { -webkit-tap-highlight-color: transparent; }
    button, a, [role="button"], .pill {
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    /* --- Ambient coffee background --------------------------------------- */
    /* Fixed to the viewport (so it never shifts while scrolling): two soft warm
       pools for depth + a faint, tiled coffee-bean pattern. All low-contrast so
       it sits quietly behind the frosted cards. */
    .ambient { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }

    .blob { position: absolute; border-radius: 9999px; filter: blur(80px); opacity: 0.40; }
    .blob-1 { width: 360px; height: 360px; background: #e8d3bf; top: -90px; left: -90px; }
    .blob-2 { width: 320px; height: 320px; background: #ddc6b4; bottom: -80px; right: -80px; }

    /* Soft rising steam, very subtle. */
    .steam { position: absolute; inset: 0; opacity: 0.07; filter: blur(0.4px); }

    /* --- Frosted glass ---------------------------------------------------- */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .glass-header {
      background: rgba(243, 241, 238, 0.7);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border-bottom: 1px solid rgba(157, 132, 117, 0.12);
    }

    /* --- Card entrance + hover ------------------------------------------- */
    .card {
      position: relative;
      transition: transform .35s cubic-bezier(.22,.61,.36,1),
                  box-shadow .35s ease, background-color .35s ease;
      will-change: transform;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px -12px rgba(125, 103, 87, 0.28);
      background: rgba(255, 255, 255, 0.72);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rise { animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }

    /* --- Category swap: cross-fade the whole list as one block ----------- */
    /* Fading the list container (out-in) avoids the per-card overlap glitch;
       the individual cards still stagger in via the `rise` animation. */
    .swap-enter-active { transition: opacity .3s ease; }
    .swap-leave-active { transition: opacity .2s ease; }
    .swap-enter-from, .swap-leave-to { opacity: 0; }

    /* --- Toast fade ------------------------------------------------------ */
    .fade-enter-active, .fade-leave-active { transition: opacity .3s ease, transform .3s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; transform: translate(-50%, 10px); }

    /* --- Side drawer ----------------------------------------------------- */
    .drawer-enter-active, .drawer-leave-active { transition: transform .32s cubic-bezier(.22,.61,.36,1); }
    .drawer-enter-from, .drawer-leave-to { transform: translateX(-100%); }
    .overlay-enter-active, .overlay-leave-active { transition: opacity .3s ease; }
    .overlay-enter-from, .overlay-leave-to { opacity: 0; }

    /* --- Bottom sheet (cart) -------------------------------------------- */
    .sheet-enter-active, .sheet-leave-active { transition: transform .34s cubic-bezier(.22,.61,.36,1); }
    .sheet-enter-from, .sheet-leave-to { transform: translateY(100%); }

    /* Crisp text rendering for a polished, modern feel */
    h1, h2, h3, .font-display { letter-spacing: -0.01em; }
    input { font-family: inherit; }

    /* --- Pills ----------------------------------------------------------- */
    .pill { position: relative; overflow: hidden; transition: background-color .3s ease, color .3s ease, transform .2s ease, box-shadow .3s ease; }
    .pill:active { transform: scale(.94); }

    /* A selected (in-cart) card gets a clean coffee-toned ring. */
    .selected-liquid { box-shadow: 0 0 0 2px rgba(111,77,51,.55), 0 12px 26px -14px rgba(67,48,31,.3); }

    /* Hide the horizontal scrollbar on the category pill row */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .snap-x-mandatory { scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch; }

    /* Gentle focus ring for inline-edit fields */
    [contenteditable="true"]:focus { background: rgba(255,255,255,.6); border-radius: 6px; }

    @media (prefers-reduced-motion: reduce) {
      .blob, .card, .pill { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body class="text-mocha-600 antialiased">
  <!-- Ambient coffee background, fixed behind everything -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Faint rising-steam pattern (drifts slowly upward) -->
    <svg class="steam" width="100%" height="100%">
      <defs>
        <pattern id="steamTile" width="170" height="260" patternUnits="userSpaceOnUse">
          <g fill="none" stroke="#8c6a4b" stroke-linecap="round">
            <path d="M44,270 C 64,228 24,196 44,154 C 64,112 24,82 44,40" stroke-width="3"/>
            <path d="M120,270 C 138,232 106,204 120,166 C 134,128 108,102 120,64" stroke-width="2.6"/>
          </g>
          <animateTransform attributeName="patternTransform" type="translate"
                            from="0 0" to="0 -260" dur="18s" repeatCount="indefinite"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#steamTile)"/>
    </svg>
  </div>

  <!-- The whole app is constrained to a phone-width column and centered. -->
  <div id="app" class="relative z-10 mx-auto max-w-md min-h-screen"></div>

  <!-- Mount point template lives in app.js. The ?v= is bumped on each deploy
       so browsers always fetch the latest version instead of a cached copy. -->
  <script src="app.js?v=20260628b"></script>
</body>
</html>
